name: 功能请求 / Feature request
title: "[Feature] "
description: 提出你的功能请求 / Propose your feature request
labels: ["pending triage"]

body:
  - type: markdown
    attributes:
      value: |
        ## 感谢您花时间填写，在提交问题之前，请确保您完成以下操作
        1. GKD-Aim 默认不提供任何规则，你可以查看 [GKD-Aim 项目说明](https://github.com/AngryDisk/GKD-Aim#readme) 后自行编写规则或者导入远程订阅
        2. 请 **判断** 是不是第三方规则订阅的功能请求，如果是，你应该向规则提供者反馈，而不是在这里提交，**此处只接受 GKD-Aim 修改版应用本体的功能请求**
        3. 请 **确保** [已有问题](https://github.com/AngryDisk/GKD-Aim/issues?q=is%3Aissue) 中没有人提交过相似问题
        4. 请 **确保** 你想要的功能在 [GKD-Aim Releases](https://github.com/AngryDisk/GKD-Aim/releases) 发布的最新版本中尚未提供
  - type: textarea
    id: feature-description
    attributes:
      label: |
        新功能描述
      description: |
        例如: 我希望在 GKD-Aim 中的什么页面添加什么功能，以及这个功能的作用是什么\
        或者在规则定义中添加某个字段，以及这个字段的作用是什么\
        请使用准确的描述，否则你的问题将会被直接关闭
    validations:
      required: true
